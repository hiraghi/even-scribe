<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Even Scribe</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body { font-family: system-ui, sans-serif; background: #1e1e1e; color: #ddd; }
      #app { display: flex; flex-direction: column; height: 100%; padding: 8px; box-sizing: border-box; gap: 8px; }
      .settings { display: flex; flex-direction: column; gap: 6px; flex: 1; min-height: 0; }
      .settings input { padding: 6px; background: #2a2a2a; color: #ddd; border: 1px solid #444; border-radius: 4px; }
      .settings button, .editor-toolbar button { padding: 6px 14px; background: #3a3a3a; color: #ddd; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
      #screen { flex: 1; margin: 0; padding: 8px; overflow: auto; background: #000; color: #4f4; border: 1px solid #333; border-radius: 4px; font-size: 13px; }
      .editor { display: flex; flex-direction: column; flex: 1; min-height: 0; gap: 8px; }
      .editor-toolbar { display: flex; align-items: center; gap: 8px; }
      .editor-status { flex: 1; font-size: 13px; color: #aaa; }
      .editor textarea { flex: 1; min-height: 50vh; width: 560px; max-width: 100%; box-sizing: border-box; resize: none;
        padding: 10px; font: 14px/1.5 ui-monospace, Consolas, monospace;
        background: #111; color: #eee; caret-color: #4f4; border: 1px solid #444; border-radius: 4px; outline: none; }
      .editor textarea:focus { border-color: #4f4; }
      #new-file-form { display: flex; align-items: center; gap: 6px; position: fixed; inset: 0; z-index: 1; padding: 16px; background: rgba(0, 0, 0, 0.72); }
      #new-file-form[hidden] { display: none; }
      #new-file-form label { color: #ddd; }
      #new-file-form input { flex: 1; padding: 6px; background: #2a2a2a; color: #ddd; border: 1px solid #444; border-radius: 4px; }
      #new-file-form button { padding: 6px 14px; background: #3a3a3a; color: #ddd; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
      #draft-recovery { display: flex; align-items: center; gap: 8px; padding: 6px; background: #332f1a; border: 1px solid #665c2a; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
