name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Use `npm install` (not `npm ci`): a known npm bug leaves some of esbuild's
      # platform-specific optional packages without the `optional` flag in the
      # lockfile (dual esbuild versions via vite/vitest), which makes `npm ci`
      # hard-fail with EBADPLATFORM on the Linux runner. `npm install` skips the
      # non-matching platform packages instead of erroring.
      - run: npm install --no-audit --no-fund

      - run: npm --workspace client run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
